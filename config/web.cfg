# Web UI settings (local data-quality server). See docs/web-ui-plan.md.
# Matches the project's other config/*.cfg files (configparser format).
# Precedence: CLI flag > this file > built-in default.

[web]
# Port the local server listens on.
port = 8000

# Default per-resource-type cap applied to an interactive run. Keeps runs fast;
# the UI always reports coverage so truncation is visible. 0 = no cap (may be
# slow on large databases). Can also be overridden per-run from the page.
default_cap = 500

# uvicorn log level: critical | error | warning | info | debug | trace
log_level = info

# NOTE: the bind host is intentionally NOT configurable here. The server is
# hard-bound to 127.0.0.1 (localhost-only) and rejects non-localhost Host
# headers — that is the security model. Exposing it on the network would require
# adding authentication + TLS first. See README "Web UI (local)".
