# quality_rules.cfg — data quality engine configuration
# =====================================================
# Settings here are the project-level defaults.
# Any value can be overridden at run time with the matching CLI argument.
#
# Run `python src/run_quality_check.py --help` for all options.

[medplum]
# FHIR search page size used when paginating results from Medplum.
# Larger pages mean fewer round trips but more memory per page.
#   Override at run time: --page-size 200
page_size = 100

# Maximum number of resources to evaluate per resource type.
# 0 means no limit (fetch everything).
#   Override at run time: --limit 500
max_resources = 0


[engine]
# Default FHIR resource types to evaluate when none are passed on the CLI.
# Comma-separated. Override by repeating --resource on the command line.
resource_types = Patient, Observation, Encounter

# Minimum severity that causes the run to exit non-zero (useful in CI).
#   error    exit non-zero only when an ERROR-severity rule fails
#   warning  exit non-zero on WARNING or ERROR
#   none     always exit zero (report only)
#   Override at run time: --fail-on warning
fail_on = error


[rules]
# Comma-separated rule ids to disable for this run. Leave blank to run all
# registered rules. Rule ids are declared on each Rule subclass.
#   Example: disabled = patient-gender-valid, observation-has-value
disabled =
